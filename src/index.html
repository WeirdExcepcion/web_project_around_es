<!-- index.html para cumplir con la lista de comprobacion, se actualizan paths -->
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta content="ie=edge" http-equiv="X-UA-Compatible" />
    <title>Around The U.S.</title>
    <link href="./vendor/normalize.css" rel="stylesheet" />
    <link href="./pages/index.css" rel="stylesheet" />
  </head>
  <body class="page">
    <div class="page__content">
      <header class="header page__section">
        <img
          alt="Logotipo Around The U.S."
          class="logo header__logo"
          src="../images/logo.svg"
        />
      </header>
      <main class="content">
        <section class="profile page__section">
          <div class="profile__avatar-container">
            <img
              class="profile__image"
              src="./images/avatar.jpg"
              alt="Avatar"
            />
            <button
              class="profile__image-edit-button"
              type="button"
              aria-label="Editar foto de perfil"
            ></button>
          </div>

          <div class="profile__info">
            <h1 class="profile__title">Cargando...</h1>
            <button
              aria-label="Editar perfil"
              class="profile__edit-button"
              type="button"
            ></button>
            <p class="profile__description">Cargando...</p>
          </div>

          <button
            aria-label="Agregar tarjeta"
            class="profile__add-button"
            type="button"
          ></button>
        </section>

        <section class="cards page__section">
          <ul class="cards__list"></ul>
        </section>
      </main>

      <footer class="footer page__section">
        <p class="footer__copyright">© 2026 Around The U.S.</p>
      </footer>

      <div class="popup" id="edit-popup">
        <div class="popup__content">
          <button
            aria-label="Cerrar ventana emergente"
            class="popup__close"
            type="button"
          ></button>
          <h3 class="popup__title">Editar perfil</h3>
          <form
            class="popup__form"
            name="edit-profile"
            id="edit-profile-form"
            novalidate
          >
            <input
              class="popup__input popup__input_type_name"
              id="name-input"
              name="name"
              placeholder="Nombre"
              type="text"
              minlength="2"
              maxlength="40"
              required
            />
            <span
              class="popup__input-error name-input-error"
              id="name-input-error"
            ></span>

            <input
              class="popup__input popup__input_type_about"
              id="about-input"
              name="about"
              placeholder="Acerca de mí"
              type="text"
              minlength="2"
              maxlength="200"
              required
            />
            <span
              class="popup__input-error about-input-error"
              id="about-input-error"
            ></span>

            <button class="button popup__button" type="submit">Guardar</button>
          </form>
        </div>
      </div>

      <div class="popup" id="new-card-popup">
        <div class="popup__content">
          <button
            aria-label="Cerrar ventana emergente"
            class="popup__close"
            type="button"
          ></button>
          <h3 class="popup__title">Nuevo lugar</h3>
          <form
            class="popup__form"
            name="new-card"
            id="new-card-form"
            novalidate
          >
            <input
              class="popup__input popup__input_type_card-name"
              id="card-title-input"
              name="name"
              placeholder="Título"
              type="text"
              minlength="2"
              maxlength="30"
              required
            />
            <span
              class="popup__input-error card-title-input-error"
              id="card-title-input-error"
            ></span>

            <input
              class="popup__input popup__input_type_card-link"
              id="card-url-input"
              name="link"
              placeholder="Enlace a la imagen"
              type="url"
              required
            />
            <span
              class="popup__input-error card-url-input-error"
              id="card-url-input-error"
            ></span>

            <button class="button popup__button" type="submit" disabled>
              Crear
            </button>
          </form>
        </div>
      </div>

      <div class="popup" id="image-popup">
        <div class="popup__content popup__content_type_image">
          <button
            aria-label="Cerrar ventana emergente"
            class="popup__close"
            type="button"
          ></button>
          <img alt="" class="popup__image" src="#" />
          <p class="popup__caption"></p>
        </div>
      </div>
    </div>

    <script type="module" src="./pages/index.js"></script>

    <template id="card-template">
      <li class="card">
        <button
          aria-label="Eliminar tarjeta"
          class="card__delete-button"
          type="button"
        ></button>
        <img class="card__image" src="" alt="" />
        <div class="card__description">
          <h2 class="card__title"></h2>
          <button
            aria-label="Botón Me gusta"
            class="card__like-button"
            type="button"
          ></button>
        </div>
      </li>
    </template>

    <div class="popup" id="delete-confirmation-popup">
      <div class="popup__content">
        <button class="popup__close" type="button" aria-label="Cerrar"></button>
        <h2 class="popup__title">¿Estás seguro?</h2>
        <form
          class="popup__form"
          name="delete-confirmation-form"
          id="delete-form"
          novalidate
        >
          <button class="popup__button" type="submit">Sí</button>
        </form>
      </div>
    </div>

    <div class="popup" id="avatar-popup">
      <div class="popup__content">
        <button class="popup__close" type="button" aria-label="Cerrar"></button>
        <h2 class="popup__title">Cambiar foto de perfil</h2>
        <form
          class="popup__form"
          name="avatar-form"
          id="avatar-form"
          novalidate
        >
          <input
            type="url"
            name="avatar"
            id="avatar-url-input"
            class="popup__input popup__input_type_avatar"
            placeholder="Enlace a la imagen"
            required
          />
          <span
            class="popup__input-error avatar-url-input-error"
            id="avatar-url-input-error"
          ></span>
          <button class="popup__button" type="submit">Guardar</button>
        </form>
      </div>
    </div>
  </body>
</html>
